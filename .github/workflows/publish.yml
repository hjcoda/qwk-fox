name: "publish"
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            artifact_suffix: "macos-arm64"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            artifact_suffix: "macos-x64"
          - platform: "ubuntu-22.04"
            args: ""
            artifact_suffix: "linux-amd64"
          - platform: "windows-latest"
            args: ""
            artifact_suffix: "windows-x64"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt-get install -y libwayland-dev pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev xdg-utils

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "qwk-fox-${{ matrix.artifact_suffix }}"

  e2e-tauri-smoke:
    needs: publish-tauri
    strategy:
      fail-fast: false
      matrix:
        platform: ["ubuntu-22.04", "windows-latest"]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt-get install -y libwayland-dev pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev build-essential xvfb

      - name: Download Linux artifact
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/download-artifact@v4
        with:
          name: qwk-fox-linux-amd64
          path: ./build

      - name: Download Windows artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/download-artifact@v4
        with:
          name: qwk-fox-windows-x64
          path: ./build

      - name: Setup Playwright
        run: npm ci && npx playwright install --with-deps

      - name: Run smoke tests (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: xvfb-run npm run test:e2e:tauri
        env:
          TEST_PLATFORM: linux
          TEST_APP_PATH: ./build

      - name: Run smoke tests (Windows)
        if: matrix.platform == 'windows-latest'
        run: npm run test:e2e:tauri
        env:
          TEST_PLATFORM: windows
          TEST_APP_PATH: ./build
