<!doctype html>
<html lang="en">
  <head>
    <script>
      try {
        const params = new URLSearchParams(window.location.search);
        if (params.has("window")) {
          document.documentElement.classList.add("window-pending");
        }
      } catch (error) {
        // ignore
      }
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html.window-pending body {
        visibility: hidden;
      }
    </style>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QWK Fox</title>
  </head>

  <body>
    <main id="root"></main>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
